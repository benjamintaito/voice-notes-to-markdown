# Voice Notes to Markdown configuration
# Paths: you can point "notes" directly to a folder inside your Obsidian vault.

paths:
  pending: "pending_audio"
  processed: "processed_audio"
  notes: "notes"

whisper:
  model_size: "small"   # tiny, base, small, medium, large-v3 (bigger = better quality, slower)
  language: "es"
  device: "cpu"
  compute_type: "int8"  # int8 is fast on CPU; use "float16" if running on GPU (device: "cuda")

supported_extensions:
  - .mp3
  - .m4a
  - .wav
  - .aac
  - .ogg
  - .flac
  - .wma
  - .mp4
